      </button>
      <button id="bm-select-delete-btn" class="verse-action-btn verse-action-btn--danger" type="button" disabled aria-label="선택한 항목 삭제">
        <svg class="va-icon" viewBox="2.5 3 19 19" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h16"/><path d="M9 7V5.5A1.5 1.5 0 0 1 10.5 4h3A1.5 1.5 0 0 1 15 5.5V7"/><path d="M6.5 7 7.5 19.5A1.5 1.5 0 0 0 9 21h6a1.5 1.5 0 0 0 1.5-1.5L17.5 7"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>
    </div>
    <button id="bm-select-cancel-btn" type="button" aria-label="선택 취소">
      <svg class="va-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6 18 18M18 6 6 18"/></svg>
    </button>
  </div>

  <!-- 북마크 이동 모달 (ADR-029 개정) — 선택 모드 pill 의 "이동" 진입. 최상위 + 폴더 목록을
       보여주고, 탭한 대상으로 선택 항목을 즉시 이동(확인 버튼 없음, iOS "앨범으로 이동" 패턴).
       목록 아래 "새 폴더" 버튼은 상위 폴더 지정이 가능한 새 폴더 모달을 연다(미지정=최상위).
       선택에 포함된 폴더·그 하위는 목적지에서 제외된다. -->
  <div id="bm-move-scrim" aria-hidden="true" hidden></div>
  <div id="bm-move-modal" role="dialog" aria-modal="true" aria-labelledby="bm-move-title" hidden>
    <h2 id="bm-move-title">이동할 폴더 선택</h2>
    <ul id="bm-move-list" role="group" aria-label="폴더 목록"></ul>
    <button id="bm-move-new-folder" type="button" class="bm-move-newfolder">
      <span class="bm-move-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7.5a2 2 0 0 1 2-2h3.6l1.8 2H19a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7.5Z"/><path d="M12 11.5v4"/><path d="M10 13.5h4"/></svg>
      </span>
      <span class="bm-move-label">새 폴더</span>
    </button>
    <div id="bm-move-actions">
      <button id="bm-move-cancel" type="button">취소</button>
    </div>
  </div>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CWVVPW11TE"></script>
  <!-- Drive sync modules (load order matters: debug-log → refresh-store → transport → state-machine → facade) -->
  <script type="module" src="/js/sync/debug-log.js"></script>
  <script type="module" src="/js/sync/refresh-store.js"></script>
  <script type="module" src="/js/sync/transport.js"></script>
  <!-- store-v2 is ESM-opted-in (ADR-018) so its `saveBookmarks`/`loadBookmarks`
       names don't collide with js/app/storage.js at the global TS scope. -->
  <script type="module" src="/js/sync/store-v2.js"></script>
  <script type="module" src="/js/sync/state-machine.js"></script>
  <script type="module" src="/js/drive-sync.js"></script>
  <!-- audio-cache.js is loaded both here and via sw.js's importScripts(),
       which only accepts classic scripts. Kept as <script defer> for that
       compatibility (ADR-019 §"예외"). -->
  <script defer src="/js/audio-cache.js"></script>
  <script defer src="/js/manifest-sync.js"></script>
  <script type="module" src="/js/gtag-init.js"></script>
  <script type="module" src="/js/app/helpers.js"></script>
  <script type="module" src="/js/app/overlay.js"></script>
  <script type="module" src="/js/app/storage.js"></script>
  <script type="module" src="/js/app/settings-ui.js"></script>
  <script type="module" src="/js/app/install.js"></script>
  <script type="module" src="/js/app/search.js"></script>
  <script type="module" src="/js/app/reading-context.js"></script>
  <script type="module" src="/js/app/verse-spec.js"></script>
  <script type="module" src="/js/app/bookmark-core.js"></script>
  <script type="module" src="/js/app/bookmark-modals.js"></script>
  <script type="module" src="/js/app/bookmark.js"></script>
  <!-- ADR-022: cite sheet (bottom sheet on mobile, right side panel on desktop) -->
  <aside id="cite-sheet" role="dialog" aria-modal="true" aria-labelledby="cite-sheet-title" hidden>
    <div id="cite-sheet-resize" aria-hidden="true"></div>
    <div id="cite-sheet-handle" aria-hidden="true"><span></span></div>
    <header id="cite-sheet-header">
      <button id="cite-sheet-back" type="button" aria-label="뒤로" hidden><svg class="title-back-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 5 8.5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></button>
      <h2 id="cite-sheet-title"></h2>
      <button id="cite-sheet-close" type="button" aria-label="닫기">&times;</button>
    </header>
    <div id="cite-sheet-body"></div>
  </aside>
  <script type="module" src="/js/app/citations.js"></script>
  <script type="module" src="/js/app/parallels.js"></script>
  <script type="module" src="/js/app/tab-history.js"></script>
  <script type="module" src="/js/app/data-fetch.js"></script>
  <script type="module" src="/js/app/audio-player.js"></script>
  <script type="module" src="/js/app/views.js"></script>
  <script type="module" src="/js/app/routing.js"></script>
  <script type="module" src="/js/app/tabbar.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
