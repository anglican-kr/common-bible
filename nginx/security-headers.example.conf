# Security headers — applied to every response.
#
# 배포 절차:
#   1. 이 파일 내용을 서버의 /etc/nginx/snippets/security-headers.conf로 복사
#   2. 각 vhost(`bible.anglican.kr`, `dev.anglican.kr`)에서:
#      - server { } 블록 최상단(logging·gzip 다음)에 `include snippets/security-headers.conf;`
#      - add_header가 있는 모든 location 블록에도 같은 include를 반복
#        (nginx는 location-level add_header가 하나라도 있으면 server-level
#         add_header inheritance를 통째로 끊는 것이 known footgun)
#   3. nginx -t → systemctl reload nginx
#
# 배포 검증:
#   curl -sSI https://{host}/ | grep -iE "x-frame|content-type-options|xss|referrer|permissions|cross-origin"
#   여섯 헤더 모두 떠야 정상.
#
# Coverage:
#   - X-Frame-Options SAMEORIGIN: legacy clickjacking 방어. CSP frame-ancestors가
#     모던 등가물(이미 CSP에 있음). 옛 브라우저용.
#   - X-Content-Type-Options nosniff: MIME sniffing → XSS 방어.
#   - X-XSS-Protection 0: 명시 비활성화. 옛 브라우저(IE/Edge legacy) auditor는
#     자체 결함으로 cross-site leak·신규 XSS를 유발하는 사례가 보고돼
#     OWASP/MDN 모두 `0` 또는 제거를 권장한다. Chrome 78에서 이미 제거됨.
#     이미 inline `script-src 'self' + sha256` CSP가 modern equivalent.
#     `0`을 명시하는 이유는 (a) 보안 스캐너가 헤더 부재를 fail로 표시하는 경우
#     대비, (b) Google upstream이 보내는 `0`과 일치 → /oauth/token 응답 중복 충돌 해소.
#   - Referrer-Policy strict-origin-when-cross-origin: 모던 브라우저 기본값과 동일.
#     same-origin은 full URL, cross-origin은 origin만, http downgrade는 미전송.
#     명시하는 이유는 (a) 옛 브라우저 기본값(`no-referrer-when-downgrade`)이
#     cross-origin에 full path를 새는 회귀를 닫고, (b) 의도를 코드로 박제.
#   - Permissions-Policy: SPA가 사용하지 않는 강력한 기능들 명시 거부.
#     camera/microphone/geolocation/payment/USB/motion sensors 모두 안 씀.
#     clipboard-read 미사용(쓰기는 사용 — `clipboard-write`은 명시 안 해 브라우저
#     기본값 self 유지). fullscreen·display-capture 미사용. interest-cohort(FLoC)·
#     browsing-topics(Topics API)는 ad-tech 시그널 누설 차단 차원에서 명시 거부.
#   - Cross-Origin-Opener-Policy same-origin: 프로세스 격리. OAuth는
#     full-page redirect라 Google을 popup·iframe으로 안 열기에 안전.
#
# Why 모든 location에 반복 include?
#   nginx의 add_header inheritance 함정: 어느 location이라도 자체 add_header를
#   하나라도 두면 server-level의 add_header가 통째로 누락됨. 즉 file-specific
#   Cache-Control을 둔 location은 보안 헤더를 별도로 다시 include해야 함.
#   snippet 파일이 단일 출처가 되므로 헤더 변경 시 한 곳만 수정.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "0" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), clipboard-read=(), fullscreen=(), display-capture=(), interest-cohort=(), browsing-topics=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
