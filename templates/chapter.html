<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>${book_name} ${chapter_number}장</title>
    <link rel="icon" type="image/x-icon" href="static/favicon.ico" />
    ${css_link_tag}
  </head>

  <body>
    <!-- 고정 헤더 -->
    <header class="fixed-header">
      <div class="fixed-header-content">
        <!-- 상단 행: 브레드크럼(좌) + 검색 폼(우) -->
        <div class="breadcrumb-row">
          <nav id="bible-breadcrumb" aria-label="Breadcrumb">
            <!-- 동적으로 채워짐 -->
          </nav>
          <form
            id="verse-search-form"
            class="breadcrumb-search"
            role="search"
            aria-label="성경 구절 검색"
          >
            <label for="verse-search" class="screen-reader-text">검색</label>
            <input
              type="text"
              id="verse-search"
              placeholder="절 ID 또는 단어 검색 (예: '창세1:3' 또는 '하느님')"
              aria-describedby="search-help"
            />
            <button id="verse-search-btn" type="submit" title="검색">
              검색
            </button>
          </form>
        </div>

        <!-- 장 제목 -->
        <div class="chapter-title-row">
          ${prev_button_html}
          <h1 class="chapter-title">${book_name} ${chapter_number}장</h1>
          ${next_button_html}
        </div>
      </div>
    </header>

    <div class="page-wrap">
      <article id="${chapter_id}">
        <!-- 오디오 플레이어 (오디오 파일이 있는 경우) -->
        <div class="audio-player-container" id="audio-container">
          <h2 class="screen-reader-text">성경 오디오</h2>
          <span class="audio-label" aria-hidden="true">오디오 듣기</span>
          <audio
            controls
            preload="metadata"
            class="bible-audio"
            aria-label="$audio_title"
          >
            <source src="$audio_path" type="audio/mpeg" />
            <p>
              브라우저가 오디오 재생을 지원하지 않습니다.
              <a href="$audio_path">오디오 파일 다운로드</a>
            </p>
          </audio>
        </div>

        <!-- 오디오 파일이 없는 경우 -->
        <div class="audio-unavailable-notice" id="audio-unavailable">
          <p class="notice-text" aria-live="polite">
            <span class="icon" aria-hidden="true">🎵</span>
            이 장의 오디오는 현재 준비 중입니다.
          </p>
        </div>

        ${verses_content}
      </article>
    </div>

    <!-- 푸터 -->
    <footer class="page-footer">
      <div class="footer-content">
        <div class="footer-section">
          <p class="footer-text">대한성서공회 허락 하에 대한성공회 사용</p>
        </div>
        <div class="footer-section footer-inline">
          <p class="footer-text">
            <a
              href="https://github.com/anglican-kr/common-bible"
              target="_blank"
              rel="noopener noreferrer"
              class="github-link"
              aria-label="GitHub 프로젝트"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
                />
              </svg>
              공동번역성서 Ver. $version
            </a>
          </p>
        </div>
      </div>
    </footer>

    ${alias_data_script} ${js_script_tag}
  </body>
</html>
