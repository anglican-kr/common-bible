name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  data-tests:
    name: Data pipeline tests (Level 1-3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run Level 1-3 tests
        run: pytest tests/test_completeness.py tests/test_ordering.py tests/test_snapshots.py -v
