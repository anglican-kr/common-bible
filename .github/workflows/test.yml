name: Tests

# Trigger philosophy: avoid running the same workflow twice when a feature
# branch has an open PR. `push` is restricted to `main` (post-merge sanity),
# while every PR run goes through `pull_request`. Branches without a PR
# don't run CI here — open the PR to get coverage.
on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test tests/unit/*.test.js
